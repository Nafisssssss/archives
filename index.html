<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naiyaz Nafis</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --text: #e8e8e8;
  --muted: #444;
  --accent: #c8a97e;
  --border: #1a1a1a;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
html { scroll-behavior: smooth; }
body { font-family: 'Geist Mono', monospace; background: var(--bg); color: var(--text); overflow-x: hidden; font-size: 13px; }
body::after { content: ""; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9000; opacity: 0.7; }
.cursor { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; position: fixed; z-index: 9999; pointer-events: none; transform: translate(-50%, -50%); }
.cursor-ring { width: 30px; height: 30px; border: 1px solid rgba(200,169,126,0.45); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: transform 0.2s; }
@keyframes shake { 0% { transform: translateX(0); } 15% { transform: translateX(-7px); } 30% { transform: translateX(7px); } 45% { transform: translateX(-5px); } 60% { transform: translateX(5px); } 75% { transform: translateX(-3px); } 90% { transform: translateX(3px); } 100% { transform: translateX(0); } }
body.shaking { animation: shake 0.45s ease; }
.film-intro { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; animation: filmFade 2.8s ease forwards; }
.film-intro span { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; letter-spacing: 0.3em; color: #555; animation: textFade 2.8s ease forwards; }
@keyframes filmFade { 0% { opacity: 1; } 60% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
@keyframes textFade { 0% { opacity: 0; letter-spacing: 0.6em; } 30% { opacity: 1; letter-spacing: 0.3em; } 70% { opacity: 1; } 100% { opacity: 0; } }
nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 22px 32px; background: rgba(10,10,10,0.8); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); }
.nav-name { font-size: 13px; letter-spacing: 0.08em; color: var(--text); user-select: none; transition: color 0.2s; }
.nav-name:hover { color: var(--accent); }
.nav-links { display: flex; gap: 28px; }
.nav-links a { text-decoration: none; color: var(--muted); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--accent); }
.hero { height: 60vh; min-height: 300px; display: flex; flex-direction: column; justify-content: flex-end; padding: 80px 32px 44px; opacity: 0; animation: fadeUp 1s ease 0.2s forwards; }
.hero-tag { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
.hero h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: clamp(50px, 11vw, 86px); line-height: 0.95; color: var(--text); margin-bottom: 18px; }
.hero-bio { font-size: 12px; line-height: 1.9; color: var(--muted); }
.sep { height: 1px; background: var(--border); margin: 0 32px; }
#gallery { padding: 36px 32px; opacity: 0; animation: fadeUp 0.9s ease 0.4s forwards; }
.section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.gallery-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; opacity: 0; transform: translateY(12px); transition: filter 0.4s ease, transform 0.4s ease, opacity 0.5s ease; filter: grayscale(100%) brightness(0.75); }
.gallery-grid img.visible { opacity: 1; transform: translateY(0); }
.gallery-grid img.visible:hover { filter: grayscale(0%) brightness(1); transform: scale(1.025); position: relative; z-index: 1; }
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9990; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
.lightbox.open { opacity: 1; pointer-events: all; }
.lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; }
.lightbox-close { position: absolute; top: 22px; right: 26px; font-size: 20px; color: #555; transition: color 0.2s; user-select: none; }
.lightbox-close:hover { color: var(--accent); }
#links { padding: 36px 32px; opacity: 0; animation: fadeUp 0.9s ease 0.6s forwards; }
.link-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); text-decoration: none; color: var(--text); transition: padding-left 0.3s ease; }
.link-item:hover { padding-left: 10px; }
.link-item:hover .link-name { color: var(--accent); }
.link-name { font-size: 13px; letter-spacing: 0.05em; transition: color 0.2s; }
.link-handle { font-size: 11px; color: var(--muted); margin-left: auto; margin-right: 14px; }
.link-arrow { font-size: 12px; color: var(--accent); opacity: 0; transform: translateX(-6px); transition: opacity 0.2s, transform 0.2s; }
.link-item:hover .link-arrow { opacity: 1; transform: translateX(0); }
footer { text-align: center; padding: 36px 32px; color: #222; font-size: 11px; letter-spacing: 0.12em; opacity: 0; animation: fadeIn 0.6s ease 1s forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.music-btn { position: fixed; bottom: 28px; right: 28px; width: 38px; height: 38px; border: 1px solid var(--border); border-radius: 50%; background: rgba(10,10,10,0.8); color: var(--accent); font-size: 12px; display: flex; align-items: center; justify-content: center; z-index: 200; transition: border-color 0.2s; backdrop-filter: blur(10px); }
.music-btn:hover { border-color: var(--accent); }
@media (max-width: 520px) { nav { padding: 18px 20px; } .hero { padding: 75px 20px 36px; } .sep { margin: 0 20px; } #gallery { padding: 28px 20px; } #links { padding: 28px 20px; } .gallery-grid { grid-template-columns: repeat(2, 1fr); } .link-handle { display: none; } }
</style>
</head>
<body>
<div class="film-intro" id="filmIntro"><span>Naiyaz Nafis</span></div>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<button class="music-btn" id="musicBtn">▶</button>
<audio id="audio" loop src="tunetank-cinematic-ambient-348342.mp3"></audio>
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lbClose">✕</span>
  <img id="lbImg" src="" alt="">
</div>
<nav>
  <div class="nav-name" id="navName">Naiyaz Nafis</div>
  <div class="nav-links">
    <a href="#gallery" id="galleryLink">Gallery</a>
    <a href="#links">Links</a>
  </div>
</nav>
<section class="hero">
  <p class="hero-tag">Dhaka, Bangladesh</p>
  <h1>Naiyaz<br>Nafis.</h1>
  <p class="hero-bio">I see things differently.<br>Sometimes I photograph them.</p>
</section>
<div class="sep"></div>
<section id="gallery">
  <p class="section-label">Selected</p>
  <div class="gallery-grid">
    <img src="Messenger_creation_D9D75AB8-89B0-4E8F-BF6F-E46B388623FC.jpeg" alt="">
    <img src="Screenshot_20260120_173427_Instagram.jpg" alt="">

    <img src="Screenshot_20260402_024247_Photos.jpg" alt="">

    <img src="Messenger_creation_78BAC92C-C236-4602-8230-EFA2F5A36672.jpeg" alt="">
  </div>
</section>
<div class="sep"></div>
<section id="links">
  <p class="section-label">Find me</p>
  <a href="https://www.instagram.com/naf1s_.lucen._?igsh=Mjd5Mm05eXl3dDZ0" target="_blank" class="link-item">
    <span class="link-name">Instagram</span>
    <span class="link-handle">@naf1s_.lucen._</span>
    <span class="link-arrow">↗</span>
  </a>
  <a href="mailto:naiyaz.nafis7@gmail.com" class="link-item">
    <span class="link-name">Email</span>
    <span class="link-handle">naiyaz.nafis7@gmail.com</span>
    <span class="link-arrow">↗</span>
  </a>
</section>
<footer>© 2026 Naiyaz Nafis</footer>
<script>
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});
(function animRing() {
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animRing);
})();
document.getElementById('navName').addEventListener('click', () => {
  document.body.classList.remove('shaking');
  void document.body.offsetWidth;
  document.body.classList.add('shaking');
  document.body.addEventListener('animationend', () => document.body.classList.remove('shaking'), { once: true });
});
const obs = new IntersectionObserver((entries) => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('visible'), i * 80);
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.gallery-grid img').forEach(img => obs.observe(img));
document.getElementById('galleryLink').addEventListener('click', e => {
  e.preventDefault();
  document.getElementById('gallery').scrollIntoView({ behavior: 'smooth' });
});
document.querySelectorAll('a, .gallery-grid img').forEach(el => {
  el.addEventListener('mouseenter', () => ring.style.transform = 'translate(-50%,-50%) scale(1.6)');
  el.addEventListener('mouseleave', () => ring.style.transform = 'translate(-50%,-50%) scale(1)');
});
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
document.querySelectorAll('.gallery-grid img').forEach(img => {
  img.addEventListener('click', () => {
    lbImg.src = img.src;
    lightbox.classList.add('open');
  });
});
document.getElementById('lbClose').addEventListener('click', () => lightbox.classList.remove('open'));
lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
const audio = document.getElementById('audio');
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', () => {
  if (audio.paused) { audio.play(); musicBtn.textContent = '▐▐'; }
  else { audio.pause(); musicBtn.textContent = '▶'; }
});
setTimeout(() => {
  document.getElementById('filmIntro').style.display = 'none';
}, 2900);
</script>
</body>
</html>
